[workspace]
name = "Bhagavad Gita (Vedabase)"
path_schema = ["chapter"]

[urn]
publisher = "vedabase.sample"
corpus = "bg"
hierarchy = ["chapter", "verse"]

[build]
enable_markdown = true
publication = "vedabase.sample:bg"
layout = "document"
templates = ["html"]
target = "view"
output = "vedabase-bg.vyview"

[build.view]
package = true

[build.view.reading]
layout = "grid"
streams = [
    { name = "mula", source = "dependency.base_corpus.mula" },
    { name = "iast", source = "dependency.base_corpus.iast" },
    { name = "translation", source = "local.translation" },
]

[dependencies]
base_corpus = { package = "vyasa-bg" }

[streams]
mula = "content/mula"
iast = "content/iast"
translation = "content/translation"
