<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedabase Gita</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
            color: #333;
            background-color: #fcfcfc;
        }

        /* Generic Vyasa Semantic Classes */
        .devanagari {
            font-size: 1.25rem;
            text-align: center;
            color: #a00;
            margin: 1.5rem 0;
            line-height: 1.8;
        }

        .iast {
            font-size: 1.1rem;
            text-align: center;
            font-style: italic;
            margin: 1.5rem 0;
        }

        .synonyms {
            font-size: 0.95rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .translation {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 1.5rem 0;
        }

        .purport {
            margin: 1.5rem 0;
            text-align: justify;
        }

        .speaker, .action, .uvaca {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.05em;
            color: #666;
            display: block;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="content">
        {{ body }}
    </div>
</body>

</html>
